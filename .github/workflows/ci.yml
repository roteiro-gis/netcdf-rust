name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.91.0 --profile minimal --component rustfmt,clippy --no-self-update
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

  msrv:
    name: MSRV
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.81.0 --profile minimal --no-self-update
      - uses: Swatinem/rust-cache@v2

      - name: Check workspace
        run: rustup run 1.81.0 cargo check --workspace --all-features --locked

  no-default-features:
    name: Test without default features
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.91.0 --profile minimal --component rustfmt,clippy --no-self-update
      - uses: Swatinem/rust-cache@v2

      - name: Test hdf5-reader no defaults
        run: cargo test -p hdf5-reader --no-default-features --locked

      - name: Test netcdf-reader no defaults
        run: cargo test -p netcdf-reader --no-default-features --locked

  cf-feature:
    name: Test CF feature
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.91.0 --profile minimal --component rustfmt,clippy --no-self-update
      - uses: Swatinem/rust-cache@v2

      - name: Test netcdf-reader with cf
        run: cargo test -p netcdf-reader --features cf --locked

  release-checks:
    name: Release checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.91.0 --profile minimal --component rustfmt,clippy --no-self-update
      - uses: Swatinem/rust-cache@v2

      - name: Fetch package dependencies
        run: cargo fetch --locked

      - name: Package workspace offline
        run: |
          cargo package --workspace --offline --locked

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.1 --locked

      # cargo-audit currently reports a dev-only rand 0.9.2 warning through
      # proptest; keep it visible here until proptest/rand ships the fix.
      - name: Audit dependencies
        run: cargo audit

  asan-fuzz-check:
    name: ASan fuzz check
    runs-on: ubuntu-24.04
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust for cargo-fuzz
        run: rustup toolchain install 1.85.0 --profile minimal --no-self-update
      - name: Install Rust
        run: rustup toolchain install nightly-2026-06-02 --profile minimal --no-self-update
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: rustup run 1.85.0 cargo install cargo-fuzz --version 0.13.1 --locked

      - name: Run open fuzz check under ASan
        working-directory: hdf5-reader
        run: rustup run nightly-2026-06-02 cargo fuzz run fuzz_hdf5_open --sanitizer address -- -runs=256

      - name: Run chunked read fuzz check under ASan
        working-directory: hdf5-reader
        run: rustup run nightly-2026-06-02 cargo fuzz run fuzz_hdf5_chunked_reads --sanitizer address -- -runs=256

  fixtures:
    name: Integration tests with fixtures
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.91.0 --profile minimal --component rustfmt,clippy --no-self-update
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate fixtures
        run: scripts/generate-fixtures.sh

      - name: Test with fixtures
        run: cargo test --workspace --locked

  bench-regression-check:
    name: Benchmark regression CI check
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/bench-regression
      BENCH_THREAD_LIST: "1,4"
      BENCH_HOT_OPS_PER_THREAD: "128"
      BENCH_SAMPLE_SIZE: "15"
      BENCH_MEASUREMENT_TIME: "0.2"
      BENCH_WARMUP_TIME: "0.2"
      BENCH_REGRESSION_THRESHOLD_PERCENT: "10"
      BENCH_REGRESSION_ABSOLUTE_THRESHOLD_NS: "5000"
      BENCH_CI_CHECK_FILTER: "open_only/netcdf_rust/(cdf1_simple|large_nc4_compressed)|metadata_reuse_handle/netcdf_rust/(cdf1_simple|nc4_compressed)|read_full_reuse_handle/netcdf_rust/(nc4_compressed|large_nc4_compressed)|slice_reuse_handle_hdf5_backend/netcdf_rust/(nc4_compressed|large_nc4_compressed)|slice_reuse_handle_classic/netcdf_rust/(large_cdf5|large_record_cdf5)|parallel_metadata_batch/netcdf_rust_x(1|4)/nc4_basic|parallel_slice_batch/netcdf_rust_x(1|4)/nc4_compressed|read_full_internal_parallel/netcdf_rust_x(1|4)/(large_nc4_compressed|nc4_compressed)|read_full_internal_parallel_nocache/netcdf_rust_x(1|4)/large_nc4_compressed"
      BENCH_BASE_REF: origin/${{ github.base_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Rust
        run: rustup toolchain install 1.91.0 --profile minimal --component rustfmt,clippy --no-self-update
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run benchmark regression CI check
        run: scripts/run-benchmark-ci-check.sh
