name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  no-default-features:
    name: Test without default features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Test hdf5-reader no defaults
        run: cargo test -p hdf5-reader --no-default-features

      - name: Test netcdf-reader no defaults
        run: cargo test -p netcdf-reader --no-default-features

  cf-feature:
    name: Test CF feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Test netcdf-reader with cf
        run: cargo test -p netcdf-reader --features cf

  release-checks:
    name: Release checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Fetch package dependencies
        run: cargo fetch --locked

      - name: Package hdf5-reader offline
        run: cargo package -p hdf5-reader --offline

      - name: Fetch published hdf5-reader for netcdf-reader verification
        run: |
          version="$(cargo pkgid -p hdf5-reader | sed 's/.*#//')"
          cargo info "hdf5-reader@${version}" --registry crates-io

      - name: Package netcdf-reader offline
        run: cargo package -p netcdf-reader --offline

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      # cargo-audit currently reports a dev-only rand 0.9.2 warning through
      # proptest; keep it visible here until proptest/rand ships the fix.
      - name: Audit dependencies
        run: cargo audit

  asan-fuzz-smoke:
    name: ASan fuzz smoke
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install --locked cargo-fuzz

      - name: Run chunked read fuzz smoke under ASan
        working-directory: hdf5-reader
        run: cargo +nightly fuzz run fuzz_hdf5_chunked_reads --sanitizer address -- -runs=256

  fixtures:
    name: Integration tests with fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate fixtures
        run: scripts/generate-fixtures.sh

      - name: Test with fixtures
        run: cargo test --workspace

  bench-regression-smoke:
    name: Benchmark regression smoke test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/bench-regression
      BENCH_THREAD_LIST: "1,4"
      BENCH_HOT_OPS_PER_THREAD: "128"
      BENCH_SAMPLE_SIZE: "15"
      BENCH_MEASUREMENT_TIME: "0.2"
      BENCH_WARMUP_TIME: "0.2"
      BENCH_REGRESSION_THRESHOLD_PERCENT: "10"
      BENCH_SMOKE_FILTER: "open_only/netcdf_rust/(cdf1_simple|large_nc4_compressed)|metadata_reuse_handle/netcdf_rust/(cdf1_simple|nc4_compressed)|read_full_reuse_handle/netcdf_rust/(nc4_compressed|large_nc4_compressed)|slice_reuse_handle_hdf5_backend/netcdf_rust/(nc4_compressed|large_nc4_compressed)|slice_reuse_handle_classic/netcdf_rust/(large_cdf5|large_record_cdf5)|parallel_open_and_read/netcdf_rust_x(1|4)/large_nc4_compressed|parallel_metadata_batch/netcdf_rust_x(1|4)/nc4_basic|parallel_slice_batch/netcdf_rust_x(1|4)/nc4_compressed|read_full_internal_parallel/netcdf_rust_x(1|4)/(large_nc4_compressed|nc4_compressed)|read_full_internal_parallel_nocache/netcdf_rust_x(1|4)/large_nc4_compressed"
      BENCH_BASE_REF: origin/${{ github.base_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run benchmark regression smoke test
        run: scripts/run-benchmark-smoke.sh
